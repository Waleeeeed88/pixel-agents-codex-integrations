name: Publish Extension

on:
  release:
    types: [published]

concurrency:
  group: publish-extension-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'Waleeeeed88/pixel-agents-codex-integrations'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json
            server/package-lock.json

      - name: Setup npm
        run: npm install -g npm@10.9.2

      - name: Read Extension Metadata
        id: meta
        run: |
          NAME=$(node -p "require('./package.json').name")
          PUBLISHER=$(node -p "require('./package.json').publisher")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "publisher=$PUBLISHER" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix_path=dist-vsix/$NAME.vsix" >> "$GITHUB_OUTPUT"

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Webview Dependencies
        working-directory: webview-ui
        run: npm ci

      - name: Install Server Dependencies
        working-directory: server
        run: npm ci

      - name: Run Release Gate
        run: npm run release:check

      - name: Package VSIX
        run: npm run package:vsix

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexeconpixel-vsix
          path: ${{ steps.meta.outputs.vsix_path }}

      - name: Upload VSIX to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.vsix_path }}

      - name: Check Publish Secrets
        id: secrets_ready
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          if [ -n "$VSCE_PAT" ]; then
            echo "vsce_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "vsce_ready=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$OPEN_VSX_TOKEN" ]; then
            echo "openvsx_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "openvsx_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to VS Code Marketplace
        id: publish_vscode
        if: steps.secrets_ready.outputs.vsce_ready == 'true'
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VSCE_PAT }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.meta.outputs.vsix_path }}
          skipDuplicate: true

      - name: Publish to Open VSX
        if: steps.secrets_ready.outputs.openvsx_ready == 'true'
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          registryUrl: https://open-vsx.org
          extensionFile: ${{ steps.meta.outputs.vsix_path }}
          skipDuplicate: true

      - name: Explain Missing Publish Secrets
        if: steps.secrets_ready.outputs.vsce_ready != 'true' || steps.secrets_ready.outputs.openvsx_ready != 'true'
        run: |
          echo "Marketplace publish skipped because one or more required secrets are missing."
          echo "Expected secrets: VSCE_PAT and OPEN_VSX_TOKEN."
